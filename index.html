<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏋️ 운동 벌금 클럽</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
:root{--pink:#FFB6C1;--mint:#B5EAD7;--coral:#FF9AA2;--purple:#C7CEEA;--bg:#FFF5F8;--radius:14px;--shadow:0 4px 18px rgba(255,150,180,.2);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);}
body{display:flex;flex-direction:column;overflow:hidden;}
.btn{border:none;border-radius:20px;padding:5px 12px;font-size:.75rem;font-weight:700;cursor:pointer;transition:transform .15s;font-family:inherit;}
.btn:hover{transform:scale(1.06);}
.btn-white{background:#fff;color:#c06080;}
.btn-coral{background:var(--coral);color:#fff;}
.btn-mint{background:var(--mint);color:#2d7a5a;}

/* 헤더 */
.hdr{background:linear-gradient(135deg,#FFB6C1,#C7CEEA);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);flex-shrink:0;z-index:10;}
.hdr h1{font-size:1rem;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.15);}
.hdr-right{display:flex;gap:6px;align-items:center;}
.sync-wrap{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:20px;padding:3px 8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0;}
.sync-dot.ok{background:#4caf50;}
.sync-dot.err{background:#f44336;}
.sync-dot.loading{background:#ff9800;animation:pulse .8s infinite;}
.sync-txt{font-size:.65rem;color:#fff;font-weight:700;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* PC 탭 */
.pc-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.pc-tabs{display:flex;background:#fff;border-bottom:2px solid #fce8f0;flex-shrink:0;}
.pc-tab{padding:8px 20px;font-size:.82rem;font-weight:700;color:#bbb;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.pc-tab.active{color:#c06080;border-bottom-color:#FFB6C1;}
.pc-pages{flex:1;overflow:hidden;position:relative;}
.pc-page{position:absolute;inset:0;display:none;overflow:hidden;}
.pc-page.active{display:flex;}

/* 달력 레이아웃 */
.pc-cal-layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.cal-wrap{flex:1;display:flex;flex-direction:column;padding:8px 6px 6px 10px;gap:6px;min-width:0;overflow:hidden;}
.sidebar{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;padding:8px 10px 6px 4px;overflow-y:auto;}
.side-card{background:#fff;border-radius:var(--radius);padding:9px 11px;box-shadow:var(--shadow);flex-shrink:0;}
.side-title{font-size:.78rem;font-weight:900;color:#c06080;margin-bottom:7px;}
.side-rank-item{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #fce8f0;}
.side-rank-item:last-child{border-bottom:none;}
.s-num{font-size:.82rem;width:18px;text-align:center;flex-shrink:0;}
.s-av{font-size:1rem;flex-shrink:0;}
.s-name{flex:1;font-weight:700;color:#555;font-size:.76rem;}
.s-cnt{font-weight:900;color:#c06080;font-size:.76rem;}
.s-ok{font-size:.68rem;color:#2d7a5a;}
.s-warn{font-size:.66rem;color:#e05070;font-weight:700;}
.prog-wrap{background:#f0e0e8;border-radius:6px;height:5px;overflow:hidden;flex:1;min-width:40px;}
.prog-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,#FFB6C1,#C7CEEA);transition:width .4s;}

/* 달력 */
.cal-nav{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cal-nav button{background:var(--pink);border:none;border-radius:50%;width:28px;height:28px;font-size:.9rem;cursor:pointer;transition:transform .15s;}
.cal-nav button:hover{transform:scale(1.15);}
.cal-title{font-weight:900;font-size:.95rem;color:#c06080;}
.week-badge{margin-left:auto;background:#fff;border-radius:20px;padding:3px 10px;font-size:.7rem;color:#c06080;font-weight:700;box-shadow:var(--shadow);}
.cal-box{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;flex-shrink:0;}
.cal-head span{text-align:center;font-size:.72rem;font-weight:700;color:#c06080;padding:2px 0;}
.cal-head span:first-child{color:#e05070;}
.cal-head span:last-child{color:#5080e0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);gap:3px;flex:1;min-height:0;}
.day-cell{background:#fff;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.07);min-height:0;}
.day-cell.other-month{background:#fdf0f4;opacity:.5;}
.day-cell.today{border:2.5px solid var(--coral);}
.day-cell.this-week{background:#fff8fb;}
.day-cell.sun .day-num{color:#e05070;}
.day-cell.sat .day-num{color:#5080e0;}
.day-num{font-size:.65rem;font-weight:700;color:#999;padding:2px 3px;flex-shrink:0;line-height:1;}

/* PC 도장 3x2 */
.stamps-pc{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);padding:2px;gap:1px;min-height:0;overflow:hidden;}
.stamps-mob{flex:1;display:grid;padding:2px;gap:1px;align-content:center;min-height:0;overflow:hidden;}
.mc1{grid-template-columns:1fr;}
.mc2{grid-template-columns:repeat(2,1fr);}
.mc3{grid-template-columns:repeat(3,1fr);}
.mc4{grid-template-columns:repeat(2,1fr);}
.mc5{grid-template-columns:repeat(3,1fr);}
.mc6{grid-template-columns:repeat(3,1fr);}

/* ★ 도장 아이콘 — 버그 수정: pointer-events 명시, transition 단순화 ★ */
.stamp-icon{
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  cursor:pointer;
  user-select:none;
  width:100%;aspect-ratio:1;
  font-size:clamp(.85rem,1.5vw,1.6rem);
  min-width:0;min-height:0;
  transition:filter .15s, box-shadow .15s;
  pointer-events:auto;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.stamp-icon.done{
  box-shadow:0 1px 4px rgba(255,150,180,.4);
  filter:none;
  opacity:1;
}
.stamp-icon.undone{
  filter:grayscale(1);
  opacity:.22;
  background:transparent!important;
  box-shadow:none;
}
.stamp-icon:hover{
  filter:none!important;
  opacity:1!important;
  z-index:5;
}
.stamp-empty{width:100%;aspect-ratio:1;pointer-events:none;}
@keyframes stampPop{0%{transform:scale(0) rotate(-25deg);}55%{transform:scale(1.4) rotate(6deg);}100%{transform:scale(1) rotate(0);}}
.stamp-icon.pop{animation:stampPop .32s cubic-bezier(.36,.07,.19,.97);}

/* 중계 */
.commentary{flex-shrink:0;background:linear-gradient(135deg,#fff0f5,#f0f4ff);border-radius:var(--radius);padding:7px 12px;border-left:4px solid var(--pink);overflow:hidden;}
.commentary.pc-com{height:82px;}
.commentary h4{font-size:.75rem;font-weight:900;color:#c06080;margin-bottom:4px;}
.com-list{display:flex;flex-direction:column;gap:3px;}
.com-item{font-size:.72rem;color:#555;background:#fff;border-radius:8px;padding:3px 8px;display:flex;gap:5px;align-items:center;animation:slideIn .3s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
.com-time{color:#ccc;font-size:.67rem;flex-shrink:0;}

/* PC 순위탭 */
.pc-rank-layout{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.rank-big-card{background:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow);}
.rank-big-title{font-size:.88rem;font-weight:900;color:#c06080;margin-bottom:10px;}
.rank-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #fce8f0;}
.rank-row:last-child{border-bottom:none;}
.rank-num{font-size:1rem;width:26px;text-align:center;flex-shrink:0;}
.rank-av{font-size:1.3rem;flex-shrink:0;}
.rank-name{flex:1;font-weight:700;color:#555;font-size:.85rem;}
.rank-cnt{font-weight:900;color:#c06080;font-size:.85rem;margin-left:8px;}
.rank-ok{font-size:.75rem;color:#2d7a5a;}
.rank-warn{font-size:.72rem;color:#e05070;font-weight:700;}

/* 정산 탭 */
.pc-fine-layout{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px;}
.fine-header-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.fine-month-select{border:2px solid var(--pink);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:.82rem;outline:none;background:#fff;color:#c06080;font-weight:700;}
.purse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.purse-card{background:#fff;border-radius:18px;padding:16px 12px 12px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .2s;}
.purse-card:hover{transform:translateY(-3px);}
.purse-avatar{font-size:2.4rem;line-height:1;}
.purse-name{font-weight:900;font-size:.9rem;color:#555;}
.purse-bags{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;min-height:32px;align-items:flex-end;}
@keyframes bagDrop{from{transform:translateY(-10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.bag-icon{font-size:1.5rem;display:inline-block;animation:bagDrop .3s ease both;}
.purse-amt{font-size:.82rem;font-weight:900;padding:3px 10px;border-radius:10px;}
.purse-amt.has-fine{background:#ffe0e0;color:#c03050;}
.purse-amt.no-fine{background:#e0fff0;color:#2d7a5a;}
.purse-paid-btn{border:none;border-radius:10px;padding:4px 12px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:2px;}
.purse-paid-btn.unpaid{background:#ffe0e0;color:#c03050;}
.purse-paid-btn.paid{background:#b5ead7;color:#1a6644;}
.purse-total-banner{background:linear-gradient(135deg,#FFB6C1,#C7CEEA);border-radius:14px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:900;font-size:.9rem;box-shadow:var(--shadow);}

/* 모바일 */
.mobile-layout{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.mob-tabs{display:flex;background:#fff;border-bottom:2px solid #fce8f0;flex-shrink:0;}
.mob-tab{flex:1;padding:10px 4px;text-align:center;font-size:.78rem;font-weight:700;color:#bbb;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.mob-tab.active{color:#c06080;border-bottom-color:#FFB6C1;}
.mob-pages{flex:1;overflow:hidden;position:relative;}
.mob-page{position:absolute;inset:0;overflow-y:auto;padding:8px 10px;display:none;flex-direction:column;gap:8px;}
.mob-page.active{display:flex;}
.mob-rank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:14px;box-shadow:var(--shadow);}
.mob-rank-num{font-size:1.3rem;width:30px;text-align:center;}
.mob-rank-av{font-size:1.8rem;}
.mob-rank-info{flex:1;}
.mob-rank-name{font-weight:900;font-size:.95rem;color:#444;}
.mob-rank-sub{font-size:.8rem;color:#c06080;font-weight:700;}
.mob-rank-badge{font-size:.75rem;padding:3px 8px;border-radius:10px;font-weight:700;white-space:nowrap;}
.mob-badge-ok{background:#e0fff0;color:#2d7a5a;}
.mob-badge-warn{background:#ffe0e0;color:#c03050;}
.mob-purse-row{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;}
.mob-purse-av{font-size:2rem;flex-shrink:0;}
.mob-purse-info{flex:1;}
.mob-purse-name{font-weight:900;font-size:.9rem;color:#444;margin-bottom:4px;}
.mob-purse-bags{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px;}
.mob-week-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #fce8f0;}
.mob-week-row:last-child{border-bottom:none;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:22px;padding:24px;width:400px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);transform:scale(.9);transition:transform .25s;}
.modal-bg.open .modal{transform:scale(1);}
.modal h3{font-size:1rem;font-weight:900;color:#c06080;margin-bottom:12px;}
.modal label{font-size:.8rem;color:#888;display:block;margin-bottom:4px;}
.modal input[type=text],.modal input[type=number]{width:100%;border:2px solid var(--pink);border-radius:20px;padding:7px 14px;font-family:inherit;font-size:.88rem;outline:none;margin-bottom:10px;}
.modal input:focus{border-color:var(--purple);}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px;max-height:180px;overflow-y:auto;}
.av-btn{aspect-ratio:1;border-radius:10px;border:2px solid #eee;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fafafa;}
.av-btn:hover{border-color:var(--pink);transform:scale(1.12);}
.av-btn.selected{border-color:var(--coral);background:#ffe8ee;transform:scale(1.08);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.mm-row{display:flex;align-items:center;gap:8px;background:#fff5f8;border-radius:10px;padding:6px 10px;margin-bottom:5px;}
.mm-av{font-size:1.2rem;} .mm-name{flex:1;font-size:.85rem;font-weight:700;color:#555;}
.mm-del{border:none;background:#ffe0e0;color:#c03050;border-radius:10px;padding:3px 10px;cursor:pointer;font-size:.72rem;font-weight:700;font-family:inherit;}

/* 주간/월간 결산 팝업 스타일 */
.pop-title{font-size:1.15rem;font-weight:900;color:#c06080;margin-bottom:4px;text-align:center;}
.pop-subtitle{font-size:.8rem;color:#aaa;text-align:center;margin-bottom:14px;}
.pop-member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.pop-member-card{border-radius:16px;padding:14px 10px;text-align:center;border:2px solid #fce8f0;}
.pop-member-card.pass{background:#f0fff8;border-color:#b5ead7;}
.pop-member-card.fail{background:#fff5f5;border-color:#ffb6c1;}
.pop-av{font-size:2rem;margin-bottom:4px;}
.pop-name{font-size:.82rem;font-weight:700;color:#555;margin-bottom:6px;}
.pop-bags{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;min-height:22px;margin-bottom:4px;}
.pop-result{font-size:.8rem;font-weight:900;padding:3px 10px;border-radius:10px;display:inline-block;}
.pop-result.ok{background:#e0fff0;color:#2d7a5a;}
.pop-result.bad{background:#ffe0e0;color:#c03050;}
.pop-cnt{font-size:.75rem;color:#999;margin-top:3px;}
.pop-total-box{background:linear-gradient(135deg,#FFB6C1,#C7CEEA);border-radius:14px;padding:12px 16px;color:#fff;font-weight:900;font-size:.9rem;text-align:center;margin-bottom:12px;line-height:1.6;}
.pop-weekly-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.pop-week-row{display:flex;justify-content:space-between;align-items:center;background:#fff5f8;border-radius:10px;padding:7px 12px;font-size:.8rem;}
.pop-week-label{color:#888;font-weight:700;}
.pop-week-val{color:#c06080;font-weight:900;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--pink);border-radius:3px;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:linear-gradient(135deg,#FFB6C1,#C7CEEA);color:#fff;padding:9px 20px;border-radius:30px;font-weight:700;font-size:.85rem;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:transform .3s;z-index:400;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading-overlay{position:fixed;inset:0;background:rgba(255,245,248,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:12px;}
.spinner{width:40px;height:40px;border:4px solid #fce8f0;border-top-color:#FFB6C1;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:1rem;font-weight:700;color:#c06080;}

@media(max-width:768px){
  body{overflow:auto;}
  .pc-wrap{display:none!important;}
  .mobile-layout{display:flex!important;}
}
@media(min-width:769px){
  .mobile-layout{display:none!important;}
  .pc-wrap{display:flex!important;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-txt">🔥 Firebase 연결 중...</div>
</div>

<div class="hdr">
  <h1>🏋️ 운동 벌금 클럽 💸</h1>
  <div class="hdr-right">
    <div class="sync-wrap">
      <div class="sync-dot loading" id="syncDot"></div>
      <span class="sync-txt" id="syncTxt">연결중</span>
    </div>
    <button class="btn btn-white" onclick="openAddModal()">➕ 멤버</button>
    <button class="btn btn-white" onclick="openManageModal()">👥 관리</button>
    <button class="btn btn-coral" onclick="openSettingsModal()">⚙️ 설정</button>
  </div>
</div>

<!-- PC -->
<div class="pc-wrap">
  <div class="pc-tabs">
    <div class="pc-tab active" onclick="pcTab(0,this)">🗓️ 달력</div>
    <div class="pc-tab" onclick="pcTab(1,this)">🏆 순위</div>
    <div class="pc-tab" onclick="pcTab(2,this)">💰 정산</div>
    <div class="pc-tab" onclick="pcTab(3,this)">📢 중계</div>
  </div>
  <div class="pc-pages">
    <div class="pc-page active" id="pcPage0">
      <div class="pc-cal-layout">
        <div class="cal-wrap">
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <div class="cal-title" id="pcCalTitle"></div>
            <button onclick="changeMonth(1)">▶</button>
            <div class="week-badge" id="pcWeekBadge"></div>
          </div>
          <div class="cal-box">
            <div class="cal-head"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
            <div class="cal-grid" id="pcCalGrid"></div>
          </div>
          <div class="commentary pc-com">
            <h4>📢 실시간 병맛 중계 🎙️</h4>
            <div class="com-list" id="pcComList"></div>
          </div>
        </div>
        <div class="sidebar">
          <div class="side-card">
            <div class="side-title">🏆 이번 주 순위</div>
            <div id="pcSideRank"></div>
          </div>
          <div class="side-card">
            <div class="side-title">📊 누적 순위</div>
            <div id="pcSideTotal"></div>
          </div>
          <button class="btn btn-coral" style="width:100%;margin-top:4px;" onclick="showWeeklyPopup()">📊 이번 주 결산</button>
          <button class="btn btn-mint" style="width:100%;margin-top:4px;" onclick="showMonthlyPopup()">💰 이번 달 정산</button>
        </div>
      </div>
    </div>
    <div class="pc-page" id="pcPage1">
      <div class="pc-rank-layout">
        <div class="rank-big-card"><div class="rank-big-title">🏆 이번 주 순위</div><div id="pcRankWeek"></div></div>
        <div class="rank-big-card"><div class="rank-big-title">📊 전체 누적 순위</div><div id="pcRankTotal"></div></div>
      </div>
    </div>
    <div class="pc-page" id="pcPage2">
      <div class="pc-fine-layout">
        <div class="fine-header-row">
          <div style="font-size:.95rem;font-weight:900;color:#c06080;">💰 월별 벌금 정산</div>
          <select class="fine-month-select" id="pcMonthSel" onchange="renderPcFine()"></select>
          <button class="btn btn-coral" onclick="showMonthlyPopup()">📊 결산 팝업</button>
        </div>
        <div class="purse-grid" id="pcPurseGrid"></div>
        <div class="purse-total-banner" id="pcPurseBanner"></div>
      </div>
    </div>
    <div class="pc-page" id="pcPage3">
      <div style="padding:16px 20px;flex:1;overflow-y:auto;">
        <div class="commentary"><h4>📢 실시간 병맛 중계 🎙️</h4><div class="com-list" id="pcComListFull"></div></div>
      </div>
    </div>
  </div>
</div>

// 서비스 시작일: 2025-05-18 (월요일)
const SERVICE_START = new Date(2025,4,18,0,0,0,0);

const MSGS={

function randMsg(type,...args){const a=MSGS[type];return a[Math.floor(Math.random()*a.length)](...args);}

let S={
  members:[
    {id:1,name:'지희',avatar:'🦄',color:'#E8D5FF'},
    {id:2,name:'병훈',avatar:'🐱',color:'#D5F0FF'},
    {id:3,name:'진명',avatar:'🐯',color:'#FFE8D5'},
    {id:4,name:'진욱',avatar:'🦖',color:'#D5FFE8'},
  ],
  records:{},paid:{},commentary:[],
  settings:{target:4,fine:10000},
};
let _vy=new Date().getFullYear(),_vm=new Date().getMonth(),_selAv='🦄';

/* ════════════════════════════════
   날짜 유틸
════════════════════════════════ */
const dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const rk=(mid,ds)=>`${mid}_${ds}`;

// ★ 버그 수정: records 값을 boolean으로 명확히 체크
function isStamped(mid,ds){
  const v = S.records[rk(mid,ds)];
  return v === true || v === 1;
}

function thisWeekRange(){
  const now=new Date(),day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));
  mon.setHours(0,0,0,0);
  const sun=new Date(mon);
  sun.setDate(mon.getDate()+6);
  sun.setHours(23,59,59,999);
  return {mon,sun};
}
function inThisWeek(ds){
  const {mon,sun}=thisWeekRange();
  const d=new Date(ds);
  return d>=mon&&d<=sun;
}

// 특정 주(월~일) 범위 내 운동 횟수
function countInRange(mid, monDate, sunDate){
  let cnt=0;
  for(let d=new Date(monDate);d<=sunDate;d.setDate(d.getDate()+1)){
    if(isStamped(mid,dk(d.getFullYear(),d.getMonth(),d.getDate()))) cnt++;
  }
  return cnt;
}

function weekCount(mid){
  const {mon,sun}=thisWeekRange();
  return countInRange(mid,mon,sun);
}

/* ════════════════════════════════
   주차 목록 생성 (서비스 시작일 기준)
   - 월요일 시작, 일요일 종료
   - 완료된 주차만 (일요일 < 오늘)
════════════════════════════════ */
function getCompletedWeeks(year, month){
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const today=new Date(); today.setHours(0,0,0,0);
  const weeks=[];

  // 해당 달 포함 주차 시작 월요일 계산
  let cur=new Date(firstDay);
  const sd=cur.getDay();
  cur.setDate(cur.getDate()-(sd===0?6:sd-1));

  while(cur<=lastDay){
    const mon=new Date(cur);
    const sun=new Date(cur); sun.setDate(cur.getDate()+6); sun.setHours(23,59,59,999);

    // 조건: 달과 겹침 + 일요일이 오늘보다 이전(완료) + 서비스 시작일 이후
    const overlaps = sun>=firstDay && mon<=lastDay;
    const completed = sun<today;  // ★ 일요일 기준으로 완료 판단
    const afterStart = mon>=SERVICE_START || sun>=SERVICE_START;

    if(overlaps && completed && afterStart){
      // 실제 계산 범위: 서비스 시작일과 월 시작일 중 늦은 날짜
      const calcFrom = new Date(Math.max(mon.getTime(), SERVICE_START.getTime(), firstDay.getTime()));
      const calcTo   = new Date(Math.min(sun.getTime(), lastDay.getTime()));
      weeks.push({mon, sun, calcFrom, calcTo});
    }
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

// 월별 누적 벌금 (완료된 주차 기준)
function calcMonthFine(mid, year, month){
  const weeks = getCompletedWeeks(year, month);
  const {target,fine} = S.settings;
  let total=0;
  const details=[];
  weeks.forEach(({mon,sun,calcFrom,calcTo})=>{
    const cnt = countInRange(mid, calcFrom, calcTo);
    if(cnt < target){
      total += fine;
      details.push({mon,sun,cnt,fine});
    } else {
      details.push({mon,sun,cnt,fine:0});
    }
  });
  return {total, details, weeks};
}

/* ════════════════════════════════
   달력 렌더
════════════════════════════════ */
function buildCells(){
  const y=_vy,m=_vm;
  const firstDow=new Date(y,m,1).getDay();
  const lastDate=new Date(y,m+1,0).getDate();
  const prevLast=new Date(y,m,0).getDate();
  const cells=[];
  for(let i=firstDow-1;i>=0;i--) cells.push({d:prevLast-i,cur:false,cy:m===0?y-1:y,cm:m===0?11:m-1});
  for(let d=1;d<=lastDate;d++) cells.push({d,cur:true,cy:y,cm:m});
  const rem=42-cells.length;
  for(let d=1;d<=rem;d++) cells.push({d,cur:false,cy:m===11?y+1:y,cm:m===11?0:m+1});
  return cells;
}

function renderCalGrid(gridId, isMob){
  const grid=document.getElementById(gridId); if(!grid) return;
  grid.innerHTML='';
  const today=new Date();
  const n=S.members.length;
  const mobCls=['','mc1','mc2','mc3','mc4','mc5','mc6'][Math.min(n,6)]||'mc6';

  buildCells().forEach(({d,cur,cy,cm},idx)=>{
    const ds=dk(cy,cm,d);
    const dow=idx%7;
    const isToday=cy===today.getFullYear()&&cm===today.getMonth()&&d===today.getDate();
    const isTW=inThisWeek(ds)&&cur;

    const cell=document.createElement('div');
    cell.className='day-cell'+(!cur?' other-month':'')+(isToday?' today':'')+(isTW?' this-week':'')+(dow===0?' sun':dow===6?' sat':'');

    const numEl=document.createElement('div');
    numEl.className='day-num'; numEl.textContent=d;
    cell.appendChild(numEl);

    const area=document.createElement('div');
    area.className=isMob?`stamps-mob ${mobCls}`:'stamps-pc';

    if(!isMob){
      // PC: 6슬롯 고정
      const slots=[...S.members];
      while(slots.length<6) slots.push(null);
      slots.slice(0,6).forEach(mem=>{
        if(!mem){
          const e=document.createElement('div');e.className='stamp-empty';area.appendChild(e);return;
        }
        area.appendChild(makeStampIcon(mem,ds));
      });
    } else {
      S.members.forEach(mem=>area.appendChild(makeStampIcon(mem,ds)));
    }
    cell.appendChild(area);
    grid.appendChild(cell);
  });
}

// ★ 도장 아이콘 생성 함수 분리 — 버그 수정 핵심
function makeStampIcon(mem, ds){
  const stamped = isStamped(mem.id, ds);
  const icon = document.createElement('div');
  icon.className = 'stamp-icon ' + (stamped ? 'done' : 'undone');
  icon.textContent = mem.avatar;
  icon.dataset.mid = mem.id;
  icon.dataset.ds  = ds;

  if(stamped){
    icon.style.background = `linear-gradient(135deg,${mem.color}99,${mem.color}55)`;
  }

  // ★ 클릭 이벤트: 단순 onclick으로 통일 (addEventListener 중복 방지)
  icon.onclick = function(e){
    e.stopPropagation();
    e.preventDefault();
    doToggleStamp(mem.id, ds, this, mem);
  };
  return icon;
}

function renderCalHeader(tId,bId){
  const el=document.getElementById(tId); if(el) el.textContent=`${_vy}년 ${_vm+1}월`;
  const {mon:wm,sun:ws}=thisWeekRange();
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const b=document.getElementById(bId); if(b) b.textContent=`📅 이번 주 ${fmt(wm)}~${fmt(ws)}`;

/* ════════════════════════════════
   ★ 도장 토글 — 버그 수정
   문제: records 값이 false/undefined/null 혼재
   해결: 명확히 true/false 로만 저장
════════════════════════════════ */
function doToggleStamp(mid, ds, iconEl, mem){
  const key = rk(mid, ds);
  const was = isStamped(mid, ds); // 현재 상태

  // ★ 상태 반전: 명확히 true 또는 삭제
  if(was){
    delete S.records[key]; // false 대신 완전 삭제
  } else {
    S.records[key] = true;
  }

  // ★ UI 즉시 업데이트
  if(was){
    // 취소: undone으로
    iconEl.classList.remove('done','pop');
    iconEl.classList.add('undone');
    iconEl.style.background = 'transparent';
    iconEl.style.boxShadow  = 'none';
  } else {
    // 인증: done으로
    iconEl.classList.remove('undone');
    iconEl.classList.add('done');
    iconEl.style.background = `linear-gradient(135deg,${mem.color}99,${mem.color}55)`;
    iconEl.classList.remove('pop');
    void iconEl.offsetWidth; // reflow
    iconEl.classList.add('pop');
    setTimeout(()=>iconEl.classList.remove('pop'),380);
  }

  // 중계 메시지
  const cnt = weekCount(mid);
  const target = S.settings.target;
  let msg;
  if(!was){
    if(cnt>=target) msg=randMsg('done',mem.name,target);
    else if(target-cnt<=1) msg=randMsg('danger',mem.name,target-cnt);
    else msg=randMsg('stamp',mem.name,cnt,target);
  } else {
    msg=randMsg('cancel',mem.name,cnt);
  }
  addComment(msg);
  renderSidebars();
  fbSave();
}

/* ════════════════════════════════

════════════════════════════════ */
function addComment(msg){
  const now=new Date();
  const t=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  S.commentary.unshift({t,msg});
  if(S.commentary.length>40) S.commentary.pop();
  renderCommentary();
}
function renderCommentary(){
  const empty='<div class="com-item">📻 <span>아무도 운동 안 함... 다들 이불 속에서 뭐함?</span></div>';

function initMonthSelects(){
  const today=new Date();
  const opts=[];
  let y=SERVICE_START.getFullYear(),m=SERVICE_START.getMonth();
  while(y<today.getFullYear()||(y===today.getFullYear()&&m<=today.getMonth())){
    opts.push({y,m}); m++; if(m>11){m=0;y++;}
  }
  opts.reverse();
  ['pcMonthSel','mobMonthSel'].forEach(id=>{
    const sel=document.getElementById(id); if(!sel) return;
    const cur=sel.value;
    sel.innerHTML=opts.map(({y,m})=>`<option value="${y}-${m}">${y}년 ${m+1}월</option>`).join('');
    if(cur) sel.value=cur;
    else { const def=`${today.getFullYear()}-${today.getMonth()}`; sel.value=def; }
  });
}

function getSelMonth(selId){
  const sel=document.getElementById(selId);
  if(!sel||!sel.value) return {y:new Date().getFullYear(),m:new Date().getMonth()};
  const [y,m]=sel.value.split('-').map(Number); return {y,m};
}

function bagHtml(bags,size='1.5rem'){
  return bags>0
    ? Array.from({length:bags},(_,i)=>`<span class="bag-icon" style="font-size:${size};animation-delay:${i*.06}s">💰</span>`).join('')
    : '<span style="font-size:.75rem;color:#ccc;">없음 🎉</span>';
}

function renderPcFine(){
  const {y,m}=getSelMonth('pcMonthSel');
  const grid=document.getElementById('pcPurseGrid');
  const banner=document.getElementById('pcPurseBanner');

  let grand=0;
  grid.innerHTML=S.members.map(mem=>{
    const {total}=calcMonthFine(mem.id,y,m);

/* ════════════════════════════════
   ★ 주간 결산 팝업
   - 이번 주 일요일 기준으로 결산
   - 4회 달성 여부 표시
════════════════════════════════ */
function showWeeklyPopup(){
  const {mon,sun}=thisWeekRange();
  const today=new Date(); today.setHours(0,0,0,0);
  const target=S.settings.target;
  const fine=S.settings.fine;

  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('wpTitle').textContent=`📊 ${fmt(mon)} ~ ${fmt(sun)} 주간 결산`;

  // 이번 주가 완료됐는지 (일요일이 오늘 이전)
  const sunDay=new Date(sun); sunDay.setHours(0,0,0,0);
  const isCompleted = sunDay < today;

  document.getElementById('wpSubtitle').textContent = isCompleted
    ? `✅ 이번 주 결산이 완료됐어요! 벌금을 확인하세요.`
    : `⏳ 이번 주는 아직 진행 중이에요. (일요일 마감)`;

  let fineTotal=0;
  // 실제 계산 범위: 서비스 시작일 이후
  const calcFrom=new Date(Math.max(mon.getTime(), SERVICE_START.getTime()));

  document.getElementById('wpGrid').innerHTML=S.members.map(mem=>{
    const cnt=countInRange(mem.id, calcFrom, sun);
    const hasFine = isCompleted && cnt<target;
    if(hasFine) fineTotal+=fine;
    const bags=hasFine?1:0;
    return `<div class="pop-member-card ${hasFine?'fail':'pass'}">
      <div class="pop-av">${mem.avatar}</div>
      <div class="pop-name">${mem.name}</div>
      <div class="pop-bags">${bags>0?`<span style="font-size:1.4rem;">💰</span>`:'<span style="font-size:1rem;">🎉</span>'}</div>
      <div class="pop-result ${hasFine?'bad':'ok'}">${hasFine?`💸 ${fine.toLocaleString()}원`:'✅ 통과!'}</div>
      <div class="pop-cnt">${cnt}/${target}회 운동</div>
    </div>`;
  }).join('');

  document.getElementById('wpTotal').innerHTML = isCompleted
    ? (fineTotal>0
        ? `💸 이번 주 총 벌금: ${fineTotal.toLocaleString()}원<br><span style="font-size:.8rem;opacity:.9;">🍺 다음 달 말에 정산해요!</span>`
        : `🎉 이번 주 벌금 없음!<br><span style="font-size:.8rem;opacity:.9;">다들 열심히 했어요~</span>`)
    : `⏳ 이번 주 현재까지 현황이에요.<br><span style="font-size:.8rem;opacity:.9;">일요일 자정에 최종 결산됩니다.</span>`;

  openModal('weeklyPopupModal');
}

/* ════════════════════════════════
   ★ 월간 결산 팝업
   - 완료된 주차 기준 벌금 합산
   - 주차별 내역 표시
════════════════════════════════ */
function showMonthlyPopup(){
  const today=new Date();
  // 정산 탭에서 선택된 달, 없으면 현재 달
  const selEl=document.getElementById('pcMonthSel');
  let y=today.getFullYear(), m=today.getMonth();
  if(selEl&&selEl.value){[y,m]=selEl.value.split('-').map(Number);}

  document.getElementById('mpTitle').textContent=`💰 ${y}년 ${m+1}월 결산`;
  document.getElementById('mpSubtitle').textContent=`완료된 주차 기준으로 계산됩니다 (일요일 마감)`;

  const weeks=getCompletedWeeks(y,m);
  const target=S.settings.target;
  const fine=S.settings.fine;
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;

  let grandTotal=0;

  // 멤버별 카드
  document.getElementById('mpGrid').innerHTML=S.members.map(mem=>{
    const {total,details}=calcMonthFine(mem.id,y,m);
    grandTotal+=total;
    const bags=total>0?Math.round(total/fine):0;
    return `<div class="pop-member-card ${total>0?'fail':'pass'}">
      <div class="pop-av">${mem.avatar}</div>
      <div class="pop-name">${mem.name}</div>
      <div class="pop-bags">${bagHtml(bags,'1.3rem')}</div>
      <div class="pop-result ${total>0?'bad':'ok'}">${total>0?`💸 ${total.toLocaleString()}원`:'✅ 0원'}</div>
      <div class="pop-cnt">${weeks.length}주 중 ${details.filter(d=>d.fine>0).length}주 미달</div>
    </div>`;
  }).join('');

  document.getElementById('mpTotal').innerHTML=grandTotal>0
    ?`💸 ${y}년 ${m+1}월 총 벌금: ${grandTotal.toLocaleString()}원<br><span style="font-size:.8rem;opacity:.9;">🍺 이번 달 말에 정산해요!</span>`
    :`🎉 ${y}년 ${m+1}월 벌금 없음!<br><span style="font-size:.8rem;opacity:.9;">다들 정말 열심히 했어요~</span>`;

  // 주차별 내역
  if(weeks.length===0){
    document.getElementById('mpWeekList').innerHTML='<div style="text-align:center;color:#aaa;font-size:.8rem;padding:10px;">완료된 주차가 없어요</div>';
  } else {
    document.getElementById('mpWeekList').innerHTML=weeks.map(({mon,sun,calcFrom,calcTo})=>{
      const weekFine=S.members.reduce((acc,mem)=>{
        const cnt=countInRange(mem.id,calcFrom,calcTo);
        return acc+(cnt<target?fine:0);
      },0);
      const passCount=S.members.filter(mem=>countInRange(mem.id,calcFrom,calcTo)>=target).length;
      return `<div class="pop-week-row">
        <span class="pop-week-label">📅 ${fmt(mon)}~${fmt(sun)}</span>
        <span style="font-size:.78rem;color:#888;">${passCount}/${S.members.length}명 통과</span>
        <span class="pop-week-val">${weekFine>0?`💸 ${weekFine.toLocaleString()}원`:'✅ 0원'}</span>
      </div>`;
    }).join('');
  }

  openModal('monthlyPopupModal');
}

/* ════════════════════════════════
   자동 팝업 (일요일 & 말일)
════════════════════════════════ */
function checkAutoPopup(){
  const today=new Date();
  const dow=today.getDay();    // 0=일
  const date=today.getDate();
  const lastDay=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const popShownKey=`popShown_${today.getFullYear()}_${today.getMonth()}_${date}`;

  if(localStorage.getItem(popShownKey)) return; // 오늘 이미 표시함

  if(dow===0){ // 일요일 → 주간 결산
    localStorage.setItem(popShownKey,'weekly');
    setTimeout(()=>showWeeklyPopup(), 1500);
  } else if(date===lastDay){ // 말일 → 월간 결산
    localStorage.setItem(popShownKey,'monthly');
    setTimeout(()=>showMonthlyPopup(), 1500);
  }
}

function addMember(){
  const name=document.getElementById('newName').value.trim();

  if(S.members.find(m=>m.name===name)){showToast('이미 있는 이름이에요!');return;}
  if(S.members.length>=6){showToast('최대 6명까지!');return;}
  const id=Date.now();

  S.members.push({id,name,avatar:_selAv,color});
  closeModal('addModal');
  showToast(`${_selAv} ${name}님 합류! 💪`);
  addComment(`🆕 ${_selAv} ${name}님 클럽 합류! 운동 안 하면 만원임 ㅋ`);

function deleteMember(id){
  const m=S.members.find(x=>x.id===id);
  if(!m||!confirm(`${m.name}님을 삭제할까요?`)) return;
  S.members=S.members.filter(x=>x.id!==id);
  Object.keys(S.records).forEach(k=>{if(k.startsWith(`${id}_`)) delete S.records[k];});
  openManageModal(); showToast(`${m.name}님 삭제됨`);
  renderAll(); fbSave();
}

  const t=parseInt(document.getElementById('targetInput').value);
  const f=parseInt(document.getElementById('fineInput').value);
  if(isNaN(t)||t<1||t>7){showToast('목표 횟수: 1~7');return;}
  if(isNaN(f)||f<0){showToast('벌금은 0 이상');return;}
  S.settings={target:t,fine:f};
  closeModal('settingsModal');
  showToast(`✅ 저장! 목표 ${t}회 / 벌금 ${f.toLocaleString()}원`);
  renderAll(); fbSave();
}

/* ════════════════════════════════
   모달 & 토스트
════════════════════════════════ */
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',e=>{if(e.target===bg) bg.classList.remove('open');});
});
let _tt;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ════════════════════════════════
   시작
════════════════════════════════ */
renderAll();
startListener();
setTimeout(()=>{
  hideLoading();
  if(document.getElementById('syncDot').classList.contains('loading')){
    setSync('err','연결실패');
    showToast('⚠️ Firebase 연결 실패. 로컬 모드로 실행 중.');
  }
  checkAutoPopup(); // 자동 팝업 체크
},5000);
</script>
