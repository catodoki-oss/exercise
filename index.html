<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏋️ 운동 벌금 클럽</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
:root{--pink:#FFB6C1;--mint:#B5EAD7;--coral:#FF9AA2;--purple:#C7CEEA;--bg:#FFF5F8;--radius:14px;--shadow:0 4px 18px rgba(255,150,180,.2);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);}
body{display:flex;flex-direction:column;overflow:hidden;}
.btn{border:none;border-radius:20px;padding:5px 12px;font-size:.75rem;font-weight:700;cursor:pointer;transition:transform .15s;font-family:inherit;}
.btn:hover{transform:scale(1.06);}
.btn-white{background:#fff;color:#c06080;}
.btn-coral{background:var(--coral);color:#fff;}
.btn-mint{background:var(--mint);color:#2d7a5a;}

.hdr{background:linear-gradient(135deg,#FFB6C1,#C7CEEA);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);flex-shrink:0;z-index:10;}
.hdr h1{font-size:1rem;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.15);}
.hdr-right{display:flex;gap:6px;align-items:center;}
.sync-wrap{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:20px;padding:3px 8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0;}
.sync-dot.ok{background:#4caf50;} .sync-dot.err{background:#f44336;}
.sync-dot.loading{background:#ff9800;animation:pulse .8s infinite;}
.sync-txt{font-size:.65rem;color:#fff;font-weight:700;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

.pc-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.pc-tabs{display:flex;background:#fff;border-bottom:2px solid #fce8f0;flex-shrink:0;}
.pc-tab{padding:8px 20px;font-size:.82rem;font-weight:700;color:#bbb;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.pc-tab.active{color:#c06080;border-bottom-color:#FFB6C1;}
.pc-pages{flex:1;overflow:hidden;position:relative;}
.pc-page{position:absolute;inset:0;display:none;overflow:hidden;}
.pc-page.active{display:flex;}

.pc-cal-layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.cal-wrap{flex:1;display:flex;flex-direction:column;padding:8px 6px 6px 10px;gap:6px;min-width:0;overflow:hidden;}
.sidebar{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;padding:8px 10px 6px 4px;overflow-y:auto;}
.side-card{background:#fff;border-radius:var(--radius);padding:9px 11px;box-shadow:var(--shadow);flex-shrink:0;}
.side-title{font-size:.78rem;font-weight:900;color:#c06080;margin-bottom:7px;}
.side-rank-item{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #fce8f0;}
.side-rank-item:last-child{border-bottom:none;}
.s-num{font-size:.82rem;width:18px;text-align:center;flex-shrink:0;}
.s-av{font-size:1rem;flex-shrink:0;} .s-name{flex:1;font-weight:700;color:#555;font-size:.76rem;}
.s-cnt{font-weight:900;color:#c06080;font-size:.76rem;}
.s-ok{font-size:.68rem;color:#2d7a5a;} .s-warn{font-size:.66rem;color:#e05070;font-weight:700;}
.prog-wrap{background:#f0e0e8;border-radius:6px;height:5px;overflow:hidden;flex:1;min-width:40px;}
.prog-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,#FFB6C1,#C7CEEA);transition:width .4s;}

.cal-nav{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cal-nav button{background:var(--pink);border:none;border-radius:50%;width:28px;height:28px;font-size:.9rem;cursor:pointer;transition:transform .15s;}
.cal-nav button:hover{transform:scale(1.15);}
.cal-title{font-weight:900;font-size:.95rem;color:#c06080;}
.week-badge{margin-left:auto;background:#fff;border-radius:20px;padding:3px 10px;font-size:.7rem;color:#c06080;font-weight:700;box-shadow:var(--shadow);}
.cal-box{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;flex-shrink:0;}
.cal-head span{text-align:center;font-size:.72rem;font-weight:700;color:#c06080;padding:2px 0;}
.cal-head span:first-child{color:#e05070;} .cal-head span:last-child{color:#5080e0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);gap:3px;flex:1;min-height:0;}
.day-cell{background:#fff;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.07);min-height:0;}
.day-cell.other-month{background:#fdf0f4;opacity:.5;}
.day-cell.today{border:2.5px solid var(--coral);}
.day-cell.this-week{background:#fff8fb;}
.day-cell.sun .day-num{color:#e05070;} .day-cell.sat .day-num{color:#5080e0;}
.day-num{font-size:.65rem;font-weight:700;color:#999;padding:2px 3px;flex-shrink:0;line-height:1;}

/* ★ 도장 — done/undone을 style로만 제어, class 충돌 제거 ★ */
.stamps-pc{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);padding:2px;gap:1px;min-height:0;overflow:hidden;}
.stamps-mob{flex:1;display:grid;padding:2px;gap:1px;align-content:center;min-height:0;overflow:hidden;}
.mc1{grid-template-columns:1fr;} .mc2{grid-template-columns:repeat(2,1fr);}
.mc3{grid-template-columns:repeat(3,1fr);} .mc4{grid-template-columns:repeat(2,1fr);}
.mc5{grid-template-columns:repeat(3,1fr);} .mc6{grid-template-columns:repeat(3,1fr);}
.stamp-empty{width:100%;aspect-ratio:1;pointer-events:none;}

.stamp-icon{
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;cursor:pointer;user-select:none;
  width:100%;aspect-ratio:1;
  font-size:clamp(.85rem,1.5vw,1.6rem);
  min-width:0;min-height:0;
  pointer-events:auto;
  -webkit-tap-highlight-color:transparent;
  /* ★ transition 제거 — 즉시 반영을 위해 ★ */
}
@keyframes stampPop{0%{transform:scale(0) rotate(-25deg);}55%{transform:scale(1.4) rotate(6deg);}100%{transform:scale(1) rotate(0);}}
.stamp-pop{animation:stampPop .32s cubic-bezier(.36,.07,.19,.97);}

.commentary{flex-shrink:0;background:linear-gradient(135deg,#fff0f5,#f0f4ff);border-radius:var(--radius);padding:7px 12px;border-left:4px solid var(--pink);overflow:hidden;}
.commentary.pc-com{height:82px;}
.commentary h4{font-size:.75rem;font-weight:900;color:#c06080;margin-bottom:4px;}
.com-list{display:flex;flex-direction:column;gap:3px;}
.com-item{font-size:.72rem;color:#555;background:#fff;border-radius:8px;padding:3px 8px;display:flex;gap:5px;align-items:center;animation:slideIn .3s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
.com-time{color:#ccc;font-size:.67rem;flex-shrink:0;}

.pc-rank-layout{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.rank-big-card{background:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow);}
.rank-big-title{font-size:.88rem;font-weight:900;color:#c06080;margin-bottom:10px;}
.rank-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #fce8f0;}
.rank-row:last-child{border-bottom:none;}
.rank-num{font-size:1rem;width:26px;text-align:center;flex-shrink:0;}
.rank-av{font-size:1.3rem;flex-shrink:0;} .rank-name{flex:1;font-weight:700;color:#555;font-size:.85rem;}
.rank-cnt{font-weight:900;color:#c06080;font-size:.85rem;margin-left:8px;}
.rank-ok{font-size:.75rem;color:#2d7a5a;} .rank-warn{font-size:.72rem;color:#e05070;font-weight:700;}

.pc-fine-layout{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px;}
.fine-header-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.fine-month-select{border:2px solid var(--pink);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:.82rem;outline:none;background:#fff;color:#c06080;font-weight:700;}
.purse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.purse-card{background:#fff;border-radius:18px;padding:16px 12px 12px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .2s;}
.purse-card:hover{transform:translateY(-3px);}
.purse-avatar{font-size:2.4rem;line-height:1;} .purse-name{font-weight:900;font-size:.9rem;color:#555;}
.purse-bags{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;min-height:32px;align-items:flex-end;}
@keyframes bagDrop{from{transform:translateY(-10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.bag-icon{font-size:1.5rem;display:inline-block;animation:bagDrop .3s ease both;}
.purse-amt{font-size:.82rem;font-weight:900;padding:3px 10px;border-radius:10px;}
.purse-amt.has-fine{background:#ffe0e0;color:#c03050;} .purse-amt.no-fine{background:#e0fff0;color:#2d7a5a;}
.purse-paid-btn{border:none;border-radius:10px;padding:4px 12px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:2px;}
.purse-paid-btn.unpaid{background:#ffe0e0;color:#c03050;} .purse-paid-btn.paid{background:#b5ead7;color:#1a6644;}
.purse-total-banner{background:linear-gradient(135deg,#FFB6C1,#C7CEEA);border-radius:14px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:900;font-size:.9rem;box-shadow:var(--shadow);}

.mobile-layout{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.mob-tabs{display:flex;background:#fff;border-bottom:2px solid #fce8f0;flex-shrink:0;}
.mob-tab{flex:1;padding:10px 4px;text-align:center;font-size:.78rem;font-weight:700;color:#bbb;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.mob-tab.active{color:#c06080;border-bottom-color:#FFB6C1;}
.mob-pages{flex:1;overflow:hidden;position:relative;}
.mob-page{position:absolute;inset:0;overflow-y:auto;padding:8px 10px;display:none;flex-direction:column;gap:8px;}
.mob-page.active{display:flex;}
.mob-rank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:14px;box-shadow:var(--shadow);}
.mob-rank-num{font-size:1.3rem;width:30px;text-align:center;} .mob-rank-av{font-size:1.8rem;}
.mob-rank-info{flex:1;} .mob-rank-name{font-weight:900;font-size:.95rem;color:#444;}
.mob-rank-sub{font-size:.8rem;color:#c06080;font-weight:700;}
.mob-rank-badge{font-size:.75rem;padding:3px 8px;border-radius:10px;font-weight:700;white-space:nowrap;}
.mob-badge-ok{background:#e0fff0;color:#2d7a5a;} .mob-badge-warn{background:#ffe0e0;color:#c03050;}
.mob-purse-row{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;}
.mob-purse-av{font-size:2rem;flex-shrink:0;} .mob-purse-info{flex:1;}
.mob-purse-name{font-weight:900;font-size:.9rem;color:#444;margin-bottom:4px;}
.mob-purse-bags{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px;}
.mob-week-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #fce8f0;}
.mob-week-row:last-child{border-bottom:none;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:22px;padding:24px;width:400px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);transform:scale(.9);transition:transform .25s;}
.modal-bg.open .modal{transform:scale(1);}
.modal h3{font-size:1rem;font-weight:900;color:#c06080;margin-bottom:12px;}
.modal label{font-size:.8rem;color:#888;display:block;margin-bottom:4px;}
.modal input[type=text],.modal input[type=number]{width:100%;border:2px solid var(--pink);border-radius:20px;padding:7px 14px;font-family:inherit;font-size:.88rem;outline:none;margin-bottom:10px;}
.modal input:focus{border-color:var(--purple);}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px;max-height:180px;overflow-y:auto;}
.av-btn{aspect-ratio:1;border-radius:10px;border:2px solid #eee;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fafafa;}
.av-btn:hover{border-color:var(--pink);transform:scale(1.12);}
.av-btn.selected{border-color:var(--coral);background:#ffe8ee;transform:scale(1.08);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.mm-row{display:flex;align-items:center;gap:8px;background:#fff5f8;border-radius:10px;padding:6px 10px;margin-bottom:5px;}
.mm-av{font-size:1.2rem;} .mm-name{flex:1;font-size:.85rem;font-weight:700;color:#555;}
.mm-del{border:none;background:#ffe0e0;color:#c03050;border-radius:10px;padding:3px 10px;cursor:pointer;font-size:.72rem;font-weight:700;font-family:inherit;}

.pop-title{font-size:1.15rem;font-weight:900;color:#c06080;margin-bottom:4px;text-align:center;}
.pop-subtitle{font-size:.8rem;color:#aaa;text-align:center;margin-bottom:14px;}
.pop-member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.pop-member-card{border-radius:16px;padding:14px 10px;text-align:center;border:2px solid #fce8f0;}
.pop-member-card.pass{background:#f0fff8;border-color:#b5ead7;} .pop-member-card.fail{background:#fff5f5;border-color:#ffb6c1;}
.pop-av{font-size:2rem;margin-bottom:4px;} .pop-name{font-size:.82rem;font-weight:700;color:#555;margin-bottom:6px;}
.pop-bags{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;min-height:22px;margin-bottom:4px;}
.pop-result{font-size:.8rem;font-weight:900;padding:3px 10px;border-radius:10px;display:inline-block;}
.pop-result.ok{background:#e0fff0;color:#2d7a5a;} .pop-result.bad{background:#ffe0e0;color:#c03050;}
.pop-cnt{font-size:.75rem;color:#999;margin-top:3px;}
.pop-total-box{background:linear-gradient(135deg,#FFB6C1,#C7CEEA);border-radius:14px;padding:12px 16px;color:#fff;font-weight:900;font-size:.9rem;text-align:center;margin-bottom:12px;line-height:1.6;}
.pop-weekly-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.pop-week-row{display:flex;justify-content:space-between;align-items:center;background:#fff5f8;border-radius:10px;padding:7px 12px;font-size:.8rem;}
.pop-week-label{color:#888;font-weight:700;} .pop-week-val{color:#c06080;font-weight:900;}

/* 진행중 주차 안내 배너 */
.ongoing-banner{background:#fff8e1;border:1.5px solid #ffe082;border-radius:10px;padding:8px 12px;font-size:.78rem;color:#a07800;font-weight:700;margin-bottom:10px;text-align:center;}

/* ══ 사다리타기 ══ */
.ladder-wrap{display:flex;flex-direction:column;gap:16px;}
.ladder-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ladder-svg-wrap{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);overflow:hidden;}
.ladder-result-area{background:linear-gradient(135deg,#fff0f5,#f0f4ff);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.ladder-result-row{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:8px 12px;box-shadow:0 2px 8px rgba(0,0,0,.05);font-size:.85rem;font-weight:700;}
.ladder-item-inp{border:2px solid var(--pink);border-radius:10px;padding:5px 10px;font-size:.8rem;font-family:inherit;outline:none;width:100%;margin-bottom:4px;}
.ladder-items-area{background:#fff;border-radius:14px;padding:12px;box-shadow:var(--shadow);}

/* ══ 메모 ══ */
.memo-wrap{display:flex;flex-direction:column;gap:12px;}
.memo-input-box{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow);}
.memo-textarea{width:100%;border:2px solid var(--pink);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:.85rem;resize:vertical;min-height:80px;outline:none;}
.memo-textarea:focus{border-color:var(--purple);}
.memo-card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:flex-start;position:relative;}
.memo-card-av{font-size:1.6rem;flex-shrink:0;}
.memo-card-body{flex:1;}
.memo-card-name{font-weight:900;font-size:.82rem;color:#c06080;}
.memo-card-time{font-size:.68rem;color:#ccc;margin-left:6px;}
.memo-card-text{font-size:.83rem;color:#444;margin-top:3px;white-space:pre-wrap;word-break:break-all;}
.memo-del{border:none;background:none;color:#ddd;cursor:pointer;font-size:.8rem;position:absolute;top:10px;right:10px;}
.memo-del:hover{color:#e05070;}

/* ══ 벌칙뽑기 ══ */
.penalty-wrap{display:flex;flex-direction:column;gap:14px;}
.penalty-roulette{background:#fff;border-radius:18px;padding:20px;box-shadow:var(--shadow);text-align:center;}
.penalty-spin-btn{background:linear-gradient(135deg,var(--coral),var(--purple));border:none;border-radius:30px;padding:12px 32px;color:#fff;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(255,154,162,.4);transition:transform .15s;}
.penalty-spin-btn:hover{transform:scale(1.06);}
.penalty-result{font-size:1.5rem;font-weight:900;color:#c06080;margin:14px 0 4px;min-height:40px;}
.penalty-sub{font-size:.8rem;color:#aaa;}
.penalty-list-card{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow);}
.penalty-inp{border:2px solid var(--pink);border-radius:10px;padding:6px 12px;font-size:.82rem;font-family:inherit;outline:none;flex:1;}
.penalty-row{display:flex;align-items:center;justify-content:space-between;background:#fff5f8;border-radius:8px;padding:6px 10px;font-size:.82rem;margin-bottom:4px;}
.penalty-del{border:none;background:none;color:#ddd;cursor:pointer;font-size:.9rem;}
.penalty-del:hover{color:#e05070;}

/* ══ 게임 공통 card ══ */
.game-card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
.game-card-title{font-size:.9rem;font-weight:900;color:#c06080;margin-bottom:10px;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--pink);border-radius:3px;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:linear-gradient(135deg,#FFB6C1,#C7CEEA);color:#fff;padding:9px 20px;border-radius:30px;font-weight:700;font-size:.85rem;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:transform .3s;z-index:400;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading-overlay{position:fixed;inset:0;background:rgba(255,245,248,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:12px;}
.spinner{width:40px;height:40px;border:4px solid #fce8f0;border-top-color:#FFB6C1;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:1rem;font-weight:700;color:#c06080;}

@media(max-width:768px){body{overflow:auto;}.pc-wrap{display:none!important;}.mobile-layout{display:flex!important;}}
@media(min-width:769px){.mobile-layout{display:none!important;}.pc-wrap{display:flex!important;}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-txt">🔥 Firebase 연결 중...</div>
</div>

<div class="hdr">
  <h1>🏋️ 운동 벌금 클럽 💸</h1>
  <div class="hdr-right">
    <div class="sync-wrap">
      <div class="sync-dot loading" id="syncDot"></div>
      <span class="sync-txt" id="syncTxt">연결중</span>
    </div>
    <button class="btn btn-white" onclick="openAddModal()">➕ 멤버</button>
    <button class="btn btn-white" onclick="openManageModal()">👥 관리</button>
    <button class="btn btn-coral" onclick="openSettingsModal()">⚙️ 설정</button>
  </div>
</div>

<div class="pc-wrap">
  <div class="pc-tabs">
    <div class="pc-tab active" onclick="pcTab(0,this)">🗓️ 달력</div>
    <div class="pc-tab" onclick="pcTab(1,this)">🏆 순위</div>

/* ════════════════════════════

function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function rk(mid,ds){return `${mid}_${ds}`;}

// ★ isStamped: 오직 true 값만 인정
function isStamped(mid,ds){
  return S.records[rk(mid,ds)] === true;
}

function countInRange(mid,from,to){
  let cnt=0;
  const f=new Date(from); f.setHours(0,0,0,0);
  const t=new Date(to);   t.setHours(23,59,59,999);
  for(let d=new Date(f);d<=t;d.setDate(d.getDate()+1)){
    if(isStamped(mid,dk(d.getFullYear(),d.getMonth(),d.getDate()))) cnt++;
  }
  return cnt;
}

// 이번 주 월~일
function thisWeekRange(){
  const now=new Date(),day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return {mon,sun};
}
function inThisWeek(ds){const{mon,sun}=thisWeekRange();const d=new Date(ds);return d>=mon&&d<=sun;}
function weekCount(mid){const{mon,sun}=thisWeekRange();return countInRange(mid,mon,sun);}

/* ════════════════════════════
   ★★★ 벌금 계산 핵심 수정 ★★★

   규칙:
   1. 주 단위: 월요일~일요일
   2. "완료된 주차"란 해당 주의 일요일이 오늘보다 이전인 경우
      즉, sun < today(시작) — 오늘이 일요일이면 오늘 주는 아직 진행중
   3. 서비스 시작: SERVICE_START(5/19 월요일)부터의 주차만 계산
   4. 해당 달(year,month)과 겹치는 주차만 계산
════════════════════════════ */
function getCompletedWeeks(year, month){
  const today = new Date();
  today.setHours(0,0,0,0); // 오늘 자정

  const firstOfMonth = new Date(year,month,1);
  const lastOfMonth  = new Date(year,month+1,0);

  // 해당 달의 첫날이 속한 주의 월요일 찾기
  let cur = new Date(firstOfMonth);
  const dow = cur.getDay();
  cur.setDate(cur.getDate() - (dow===0?6:dow-1));

  const weeks = [];
  while(cur <= lastOfMonth){
    const mon = new Date(cur);
    const sun = new Date(cur); sun.setDate(cur.getDate()+6);

    // ★ 완료 조건: 일요일 당일도 완료로 처리
    //   (일요일 저녁에 결과 팝업 → 월요일에 정산 반영)
    //   오늘이 5/18(일)이면 이 주 sun=5/18 → 5/18 <= 5/18 = true → 완료 ✓
    //   오늘이 5/17(토)이면 이 주 sun=5/18 → 5/18 <= 5/17 = false → 진행중 ✓
    const sunMidnight = new Date(sun); sunMidnight.setHours(0,0,0,0);
    const isCompleted = sunMidnight <= today;

    // 달과 겹치는지
    const overlapsMonth = sun >= firstOfMonth && mon <= lastOfMonth;

    // 서비스 시작 이후인지 (주의 시작이 SERVICE_START 이후)
    const afterService = mon >= SERVICE_START;

    if(overlapsMonth && isCompleted && afterService){
      weeks.push({mon:new Date(mon), sun:new Date(sun)});
    }
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

// 진행 중인 주차 (아직 완료 안 됨)
function getOngoingWeek(year, month){
  const today = new Date(); today.setHours(0,0,0,0);
  const firstOfMonth = new Date(year,month,1);
  const lastOfMonth  = new Date(year,month+1,0);

  let cur = new Date(firstOfMonth);
  const dow = cur.getDay();
  cur.setDate(cur.getDate()-(dow===0?6:dow-1));

  while(cur <= lastOfMonth){
    const mon = new Date(cur);
    const sun = new Date(cur); sun.setDate(cur.getDate()+6);
    const sunMidnight = new Date(sun); sunMidnight.setHours(0,0,0,0);

    const overlaps = sun>=firstOfMonth && mon<=lastOfMonth;
    const afterService = mon>=SERVICE_START;
    const isOngoing = sunMidnight > today; // 일요일이 오늘보다 이후 = 아직 진행중 (오늘이 일요일이면 완료)

    if(overlaps && afterService && isOngoing){
      return {mon:new Date(mon), sun:new Date(sun)};
    }
    cur.setDate(cur.getDate()+7);
  }
  return null;
}

function calcMonthFine(mid, year, month){
  const weeks = getCompletedWeeks(year, month);
  const {target,fine} = S.settings;
  let total=0;
  const details=[];
  weeks.forEach(({mon,sun})=>{
    const cnt = countInRange(mid,mon,sun);
    const hasFine = cnt < target;
    if(hasFine) total+=fine;
    details.push({mon,sun,cnt,fine:hasFine?fine:0});
  });
  return {total, details, weeks};
}

  const cells=[];
  for(let i=firstDow-1;i>=0;i--) cells.push({d:prevLast-i,cur:false,cy:m===0?y-1:y,cm:m===0?11:m-1});
  for(let d=1;d<=lastDate;d++) cells.push({d,cur:true,cy:y,cm:m});
  const rem=42-cells.length;
  for(let d=1;d<=rem;d++) cells.push({d,cur:false,cy:m===11?y+1:y,cm:m===11?0:m+1});
  return cells;
}

/* ════════════════════════════
   ★★★ 도장 아이콘 — 색상 버그 완전 수정 ★★★

   문제: classList.add('done')과 style.background가 서로 충돌
   해결: class를 쓰지 않고 style만으로 상태 표현
         done   → opacity:1, background:색, boxShadow:있음
         undone → opacity:0.22, background:transparent, boxShadow:없음
════════════════════════════ */
function applyStampStyle(icon, stamped, color){
  if(stamped){
    icon.style.opacity      = '1';
    icon.style.filter       = 'none';
    icon.style.background   = `linear-gradient(135deg,${color}cc,${color}77)`;
    icon.style.boxShadow    = `0 2px 6px ${color}88`;
  } else {
    icon.style.opacity      = '0.22';
    icon.style.filter       = 'grayscale(1)';
    icon.style.background   = 'transparent';
    icon.style.boxShadow    = 'none';
  }
}

function makeIcon(mem, ds){
  const stamped = isStamped(mem.id, ds);
  const icon = document.createElement('div');
  icon.className = 'stamp-icon';
  icon.textContent = mem.avatar;
  icon.title = `${mem.name} (${ds})`;

  applyStampStyle(icon, stamped, mem.color);

  icon.onclick = function(e){
    e.stopPropagation();
    e.preventDefault();
    doToggle(mem.id, ds, this, mem);
  };
  return icon;
}

/* ════════════════════════════
   ★★★ 도장 토글 — 즉시 반영 ★★★
════════════════════════════ */
function doToggle(mid, ds, icon, mem){
  const key = rk(mid, ds);
  const was = isStamped(mid, ds);

  // 데이터 업데이트
  if(was){
    delete S.records[key];
  } else {
    S.records[key] = true;
  }

  // ★ 스타일 즉시 반영 (class 없이 style만 사용)
  applyStampStyle(icon, !was, mem.color);

  // 팝 애니메이션 (인증할 때만)
  if(!was){
    icon.classList.remove('stamp-pop');
    void icon.offsetWidth;
    icon.classList.add('stamp-pop');
    setTimeout(()=>icon.classList.remove('stamp-pop'),380);
  }

  // 중계
  const cnt = weekCount(mid);
  const target = S.settings.target;
  let msg;
  if(!was){
    if(cnt>=target) msg=randMsg('done',mem.name,target);
    else if(target-cnt<=1) msg=randMsg('danger',mem.name,target-cnt);
    else msg=randMsg('stamp',mem.name,cnt,target);
  } else {
    msg=randMsg('cancel',mem.name,cnt);
  }
  addComment(msg);
  renderSidebars();
  fbSave();
}

function initMonthSelects(){
  const today=new Date();
  const opts=[];
  // SERVICE_START가 속한 달부터
  let y=SERVICE_START.getFullYear(),m=SERVICE_START.getMonth();
  while(y<today.getFullYear()||(y===today.getFullYear()&&m<=today.getMonth())){
    opts.push({y,m});m++;if(m>11){m=0;y++;}
  }
  opts.reverse();
  ['pcMonthSel','mobMonthSel'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=opts.map(({y,m})=>`<option value="${y}-${m}">${y}년 ${m+1}월</option>`).join('');
    if(cur&&opts.find(o=>`${o.y}-${o.m}`===cur))sel.value=cur;
    else sel.value=`${today.getFullYear()}-${today.getMonth()}`;
  });
}

  const date=today.getDate();
  const lastDay=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const key=`popShown_${today.getFullYear()}_${today.getMonth()}_${date}`;
  if(localStorage.getItem(key))return;
  // 일요일 → 주간 결산 팝업 (저녁 8시 이후 or 개발 테스트용 항상)
  if(dow===0){
    localStorage.setItem(key,'weekly');
    setTimeout(()=>showWeeklyPopup(),1500);
  }
  else if(date===lastDay){localStorage.setItem(key,'monthly');setTimeout(()=>showMonthlyPopup(),1500);}
}

function _buildLadder(canvas,W,H,pad,topY,botY){
  const members=S.members;const n=members.length;
  canvas.width=W*2;canvas.height=H*2;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(2,2);ctx.clearRect(0,0,W,H);
  const colW=(W-pad*2)/(n-1||1);
  const cols=members.map((_,i)=>pad+i*colW);
  cols.forEach(x=>{ctx.beginPath();ctx.moveTo(x,topY);ctx.lineTo(x,botY);ctx.strokeStyle='#FFB6C1';ctx.lineWidth=3;ctx.stroke();});
  const rungs=[];const rows=6;
  for(let r=0;r<rows;r++){const y=topY+(botY-topY)*(r+1)/(rows+1);const used=new Set();
    for(let c=0;c<n-1;c++){if(!used.has(c)&&!used.has(c+1)&&Math.random()<0.45){rungs.push({x1:cols[c],x2:cols[c+1],y});used.add(c);used.add(c+1);}}}
  rungs.forEach(({x1,x2,y})=>{ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.strokeStyle='#C7CEEA';ctx.lineWidth=2.5;ctx.stroke();});
  members.forEach((m,i)=>{ctx.font=`bold 11px 'Noto Sans KR',sans-serif`;ctx.fillStyle='#c06080';ctx.textAlign='center';ctx.fillText(m.avatar,cols[i],topY-8);});
  const items=[..._ladderItems];while(items.length<n)items.push('?');
  const shuffled=items.slice(0,n).sort(()=>Math.random()-.5);
  shuffled.forEach((item,i)=>{ctx.font=`bold 9px 'Noto Sans KR',sans-serif`;ctx.fillStyle='#7050a0';ctx.textAlign='center';ctx.fillText(item.slice(0,5),cols[i],botY+16);});
  canvas._rungs=rungs;canvas._cols=cols;canvas._topY=topY;canvas._botY=botY;canvas._shuffled=shuffled;
  return{ctx,cols,rungs,topY,botY,shuffled};
}

function drawLadder(paths){
  const canvas=document.getElementById('ladderCanvas');if(!canvas)return;
  const W=Math.min(500,canvas.parentElement.offsetWidth-32);
  const{ctx,cols}=_buildLadder(canvas,W,300,30,50,260);
  if(paths){paths.forEach(({path,color})=>{ctx.beginPath();path.forEach(([x,y],i)=>{i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.strokeStyle=color;ctx.lineWidth=4;ctx.globalAlpha=.7;ctx.stroke();ctx.globalAlpha=1;});}
}

function _calcLadderPaths(canvas){
  const{_rungs:rungs,_cols:cols,_topY:topY,_botY:botY,_shuffled:shuffled}=canvas;
  const COLORS=['#FF9AA2','#FFB347','#B5EAD7','#C7CEEA','#FFDAC1','#E2F0CB'];
  return cols.map((startX,mi)=>{
    let x=startX,y=topY;const path=[[x,y]];
    [...rungs].sort((a,b)=>a.y-b.y).forEach(rung=>{
      if(rung.y<=y)return;
      if(Math.abs(x-rung.x1)<2){path.push([x,rung.y]);x=rung.x2;path.push([x,rung.y]);}
      else if(Math.abs(x-rung.x2)<2){path.push([x,rung.y]);x=rung.x1;path.push([x,rung.y]);}
      y=rung.y;
    });
    path.push([x,botY]);
    const destIdx=cols.findIndex(cx=>Math.abs(cx-x)<5);
    return{member:S.members[mi],item:shuffled[destIdx]||'?',path,color:COLORS[mi%COLORS.length]};
  });
}

function runLadder(){
  if(_ladderRunning)return;
  const canvas=document.getElementById('ladderCanvas');if(!canvas||!canvas._cols)return;
  if(_ladderItems.length<S.members.length){showToast(`항목이 ${S.members.length}개 필요해요!`);return;}
  _ladderRunning=true;
  const results=_calcLadderPaths(canvas);
  drawLadder(results.map(r=>({path:r.path,color:r.color})));
  const ra=document.getElementById('ladderResultArea');const rl=document.getElementById('ladderResultList');
  if(ra&&rl){ra.style.display='';rl.innerHTML=results.map(r=>`<div class="ladder-result-row" style="border-left:4px solid ${r.color};"><span style="font-size:1.2rem;">${r.member.avatar}</span><span style="font-weight:900;color:#555;">${r.member.name}</span><span style="color:#aaa;">→</span><span style="color:#c06080;">${r.item}</span></div>`).join('');}
  addComment(`🪜 사다리! ${results.map(r=>`${r.member.name}→${r.item}`).join(', ')}`);fbSave();
  _ladderRunning=false;
}

}
function mobRunLadder(){
  const canvas=document.getElementById('mobLadderCanvas');if(!canvas||!canvas._cols)return;
  if(_ladderItems.length<S.members.length){showToast(`PC 사다리탭에서 항목 ${S.members.length}개 추가해주세요!`);return;}
  const results=_calcLadderPaths(canvas);
  mobDrawLadder(results.map(r=>({path:r.path,color:r.color})));
  const ra=document.getElementById('mobLadderResult');const rl=document.getElementById('mobLadderResultList');
  if(ra&&rl){ra.style.display='';rl.innerHTML=results.map(r=>`<div class="ladder-result-row" style="border-left:3px solid ${r.color};padding:6px 10px;"><span>${r.member.avatar}</span><span style="font-weight:900;">${r.member.name}</span><span style="color:#aaa;">→</span><span style="color:#c06080;font-size:.8rem;">${r.item}</span></div>`).join('');}
  addComment(`🪜 사다리! ${results.map(r=>`${r.member.name}→${r.item}`).join(', ')}`);fbSave();
}
function mobSpinPenalty(){
  const list=S.penalties||_defaultPenalties;if(!list.length)return;
  const resultEl=document.getElementById('mobPenaltyResult');const subEl=document.getElementById('mobPenaltySub');if(!resultEl)return;
  const targetId=parseInt(document.getElementById('mobPenaltyTarget')?.value||'0');
  const targetMem=targetId?S.members.find(m=>m.id===targetId):S.members[Math.floor(Math.random()*S.members.length)];
  let i=0;const spin=()=>{resultEl.textContent=list[Math.floor(Math.random()*list.length)];i++;
    if(i<20)setTimeout(spin,50+i*8);
    else{const chosen=list[Math.floor(Math.random()*list.length)];resultEl.textContent=chosen;
      const name=targetMem?`${targetMem.avatar}${targetMem.name}`:'랜덤';subEl.textContent=`${name} → ${chosen}`;
      addComment(`🎰 ${name} 벌칙: "${chosen}"`);fbSave();}};spin();
}
function addMobMemo(){
  const who=parseInt(document.getElementById('mobMemoWho')?.value);
  const text=document.getElementById('mobMemoText')?.value.trim();if(!text){showToast('메모 입력!');return;}
  if(!S.memos)S.memos=[];
  const now=new Date();const t=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  S.memos.push({mid:who,text,t});if(S.memos.length>50)S.memos.shift();
  document.getElementById('mobMemoText').value='';
  renderMobMemoList();fbSave();showToast('📝 메모 남겼어요!');
}
function renderMobMemoList(){
  const el=document.getElementById('mobMemoList');if(!el)return;
  const memos=(S.memos||[]);
  if(!memos.length){el.innerHTML='<div style="color:#aaa;font-size:.78rem;text-align:center;padding:10px;">아직 메모 없음~</div>';return;}
  el.innerHTML=[...memos].reverse().slice(0,5).map((memo,ri)=>{
    const idx=memos.length-1-ri;
    const m=S.members.find(x=>x.id===memo.mid)||{avatar:'?',name:'?',color:'#eee'};
    return `<div class="memo-card" style="border-left:3px solid ${m.color};padding:8px 10px;gap:6px;"><div class="memo-card-av" style="font-size:1.2rem;">${m.avatar}</div><div class="memo-card-body"><span class="memo-card-name">${m.name}</span><span class="memo-card-time">${memo.t}</span><div class="memo-card-text" style="font-size:.78rem;">${memo.text}</div></div><button class="memo-del" onclick="deleteMobMemo(${idx})">✕</button></div>`;
  }).join('');
}
function deleteMobMemo(idx){if(!S.memos)return;S.memos.splice(idx,1);renderMobMemoList();fbSave();}

renderAll();
startListener();
setTimeout(()=>{
  hideLoading();
  if(document.getElementById('syncDot').classList.contains('loading')){
    setSync('err','연결실패');showToast('⚠️ Firebase 연결 실패. 로컬 모드.');
  }
  checkAutoPopup();
},5000);
</script>
</body>
